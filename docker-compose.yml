# 个人博客：MySQL + Node API + Nginx
# 使用：在 personal-site 目录执行
#   docker compose up -d --build
# 访问：http://localhost:HTTP_PORT （默认 8090，见 .env）
# 改 server 源码（含评论等 API）后须：docker compose up -d --build api
# 后台列表：/admin.html  编辑正文：/write.html  默认 admin / changeme（务必修改环境变量）

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass_change_me}
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blogpass_change_me}
    volumes:
      - mysql_blog_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s
    restart: unless-stopped

  api:
    build: ./server
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: blog
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blogpass_change_me}
      MYSQL_DATABASE: blog
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_change_me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      BLOG_TITLE: ${BLOG_TITLE:-写作笔记}
      BLOG_DESCRIPTION: ${BLOG_DESCRIPTION:-基于 MySQL 与 Markdown 的个人博客。}
      SITE_OWNER_NAME: ${SITE_OWNER_NAME:-}
      JUHE_WEATHER_KEY: ${JUHE_WEATHER_KEY:-}
      JUHE_WEATHER_CITY: ${JUHE_WEATHER_CITY:-深圳}
      JUHE_WEATHER_DAILY_LIMIT: ${JUHE_WEATHER_DAILY_LIMIT:-50}
      WEATHER_CACHE_TTL_MS: ${WEATHER_CACHE_TTL_MS:-28800000}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./public/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      # 若 8080 已被其他容器占用（如 my-nginx），默认改用 8090
      - "${HTTP_PORT:-8090}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_blog_data:
