<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/" />
  <title>跳转中…</title>
  <link rel="stylesheet" href="/styles.css" />
  <script>
    (function () {
      var q = new URLSearchParams(location.search).get("id");
      if (q && /^\d+$/.test(q)) {
        location.replace(location.pathname.replace(/[^/]*$/, "") + "post/" + q);
        return;
      }
      location.replace(location.pathname.replace(/[^/]*$/, "") || "/");
    })();
  </script>
</head>
<body class="theme-flat">
  <p style="padding: 2rem; color: var(--muted);">正在跳转到文章页…</p>
</body>
</html>
