<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="个人博客 — 文章列表" />
  <title>博客 · 文章列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-flat">
  <div class="bg" aria-hidden="true"></div>
  <div class="wrap">
    <header class="site-header">
      <div class="brand brand--home-meta">
        <a class="brand-avatar-link" id="brand-avatar-link" href="profile.html" data-nav-page="profile" aria-label="我的资料">
          <span class="brand-avatar-slot" id="brand-avatar-slot" aria-hidden="true"></span>
        </a>
        <div class="brand-main">
          <div class="brand-greeting-block">
            <a class="brand-text" href="index.html">
              <span id="brand-greeting">博客</span>
            </a>
            <p class="brand-bio" id="brand-bio" hidden></p>
          </div>
          <div class="brand-meta" aria-live="polite">
            <time id="home-datetime" datetime=""></time>
            <span class="brand-meta__sep" aria-hidden="true">·</span>
            <span id="home-weather">天气加载中…</span>
          </div>
        </div>
      </div>
      <nav class="nav site-nav" id="site-nav" aria-label="主导航">
        <a href="index.html" data-nav-page="home">文章</a>
        <a href="admin.html" data-nav-page="write" data-nav-auth hidden>写作</a>
        <a href="博客说明.html" data-nav-page="docs">说明</a>
        <a href="admin.html#login" data-nav-page="login" data-nav-guest>登录</a>
        <button type="button" class="nav-btn" id="nav-logout" data-nav-auth hidden>退出</button>
      </nav>
    </header>

    <main class="main--home">
      <div class="home-write-cta" id="write-cta" data-nav-auth hidden>
        <a class="home-write-cta__link" href="write.html">
          <span class="home-write-cta__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
          </span>
          <span class="home-write-cta__body">
            <span class="home-write-cta__title">开始写作</span>
            <span class="home-write-cta__sub">打开编辑器，支持 Markdown 与图片粘贴</span>
          </span>
          <span class="home-write-cta__chev" aria-hidden="true">→</span>
        </a>
      </div>

      <div class="tag-bar card" id="tag-bar-wrap" style="display: none;">
        <span class="tag-bar__label">按标签筛选</span>
        <div class="tag-chips" id="tag-chips" role="toolbar" aria-label="标签筛选"></div>
      </div>

      <ul class="post-list" id="post-list" aria-live="polite"></ul>
    </main>

    <footer class="site-footer site-footer--home">
      <div class="site-footer__home-inner">
        <p class="site-footer__meta">
          数据存储于 MySQL · 通过 <code>/api</code> 提供接口 · 详见
          <a href="博客说明.html" class="site-footer__link">部署说明</a>
        </p>
        <p class="site-footer__contact site-footer__contact--inline">
          <a class="site-footer__mailto" href="mailto:you@example.com">联系作者</a>
        </p>
      </div>
    </footer>
  </div>

  <script type="module" src="js/blog-index.js"></script>
</body>
</html>
