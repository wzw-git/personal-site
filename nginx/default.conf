# 博客：静态 + 反代 API 到 compose 服务 api:3000
# 使用字面量 proxy_pass（不用变量），URI 会原样转发；compose 已让 nginx 在 api 健康后再启动。
# 子路径部署需另配 location /xxx/api/ 等。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12M;

    # 安全响应头（静态页与反代共用；HTTPS 终端可在上一层再加 Strict-Transport-Security）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # 禁止访问 uploads 下以 . 开头的文件（含天气 API 状态缓存）
    location ~* ^/uploads/\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location ~* \.mjs$ {
        types { }
        default_type application/javascript;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Vue SPA：/ 与 /post/:id 等回退 index.html；*.html 仍优先命中静态文件。
    # 若出现 404：请确认站点根目录下存在 admin.html / write.html 等静态页（与 index.html 同级）。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
